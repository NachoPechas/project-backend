version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./cmd/bd/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./cmd/bd/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      
      context: . 
      dockerfile: Dockerfile 
    container_name: express_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db 
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata: 
